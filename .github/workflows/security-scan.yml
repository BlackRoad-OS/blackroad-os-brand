name: "🔒 Security Scan"

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Run npm audit
        if: hashFiles('package.json') != ''
        run: npm audit --audit-level=moderate || true

      - name: Dependency Review
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3571e89a4315193b17 # v4
        if: github.event_name == 'pull_request'

      - name: Security summary
        run: echo "Security scan complete - no CodeQL languages detected (HTML/Shell only)"
